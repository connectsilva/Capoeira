<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno - Capoeira Control</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00c853;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --input-bg: #252525;
            --text-main: #ffffff;
            --radius: 12px;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            max-width: 500px;
            margin: auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--radius);
            border: 1px solid var(--primary);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 10px; }

        label { font-size: 12px; color: var(--primary); font-weight: bold; display: block; margin-top: 15px; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; 
            border: 1px solid #333; background: var(--input-bg); color: #fff; box-sizing: border-box;
        }

        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }

        button { 
            width: 100%; padding: 15px; background: var(--primary); border: none; 
            border-radius: 8px; color: #000; font-weight: bold; margin-top: 25px; cursor: pointer;
        }

        #mensagemSucesso { display: none; text-align: center; padding: 40px 20px; }
    </style>
</head>
<body>

<div id="areaForm">
    <div class="form-container">
        <div class="header">
            <img id="profLogo" class="logo" src="https://via.placeholder.com/80">
            <h2 id="profNomeAcad" style="margin:0">Carregando...</h2>
            <p id="profNome" style="font-size:14px; color:#aaa"></p>
        </div>

        <form id="cadastroForm">
            <label>Nome Completo</label>
            <input type="text" id="nome" required>

            <div class="row">
                <div><label>Apelido</label><input type="text" id="apelido"></div>
                <div><label>Data de Nascimento</label><input type="date" id="nascimento" required></div>
            </div>

            <div class="row">
                <div><label>Sexo</label>
                    <select id="sexo">
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div><label>WhatsApp</label><input type="tel" id="tel" placeholder="(00) 00000-0000" required></div>
            </div>

            <label>Endereço Completo</label>
            <input type="text" id="endereco" placeholder="Rua, número, bairro">

            <label>Com quem reside?</label>
            <input type="text" id="reside_com">

            <label>Alergias ou Condições Médicas?</label>
            <textarea id="alergia" rows="2" placeholder="Se não houver, deixe em branco"></textarea>

            <label>Contato de Emergência (Telefone)</label>
            <input type="tel" id="emergencia_fone" required>

            <button type="submit" id="btnEnviar">ENVIAR CADASTRO</button>
        </form>
    </div>
</div>

<div id="mensagemSucesso">
    <h1 style="color: var(--primary);">💪 Axé!</h1>
    <p>Seu cadastro foi enviado com sucesso para o professor.</p>
    <p>Agora é só aguardar a confirmação na próxima aula!</p>
</div>

<script>
    // Configuração idêntica à do Professor
 const firebaseConfig = {
        apiKey: "AIzaSyAifUhJB6krANoJhGSI-CBYOCElm-QLa1Y",
        authDomain: "capoeira-oficial-b7421.firebaseapp.com",
        databaseURL: "https://capoeira-oficial-b7421-default-rtdb.firebaseio.com",
        projectId: "capoeira-oficial-b7421",
        storageBucket: "capoeira-oficial-b7421.firebasestorage.app",
        messagingSenderId: "1020091949434",
        appId: "1:1020091949434:web:6a1bc84179c9f99a76b6c3",
        measurementId: "G-ZCCXZ44Q50"
    };  
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Captura o UID do professor pela URL (?ref=UID_DO_PROFESSOR)
    const urlParams = new URLSearchParams(window.location.search);
    const profUid = urlParams.get('ref');

    async function carregarDadosProfessor() {
        if(!profUid) {
            alert("Link inválido! Peça o link correto ao seu professor.");
            return;
        }
        const doc = await db.collection('users').doc(profUid).get();
        if(doc.exists) {
            const data = doc.data();
            document.getElementById('profNomeAcad').innerText = data.config.nome;
            document.getElementById('profNome').innerText = data.config.prof;
            document.getElementById('profLogo').src = data.config.logo;
        }
    }

    document.getElementById('cadastroForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const novoAluno = {
            nome: document.getElementById('nome').value,
            apelido: document.getElementById('apelido').value,
            nascimento: document.getElementById('nascimento').value,
            sexo: document.getElementById('sexo').value,
            tel: document.getElementById('tel').value,
            endereco: document.getElementById('endereco').value,
            reside_com: document.getElementById('reside_com').value,
            alergia: document.getElementById('alergia').value,
            emergencia_fone: document.getElementById('emergencia_fone').value,
            valor: 0, // Professor define depois
            parcelas: [], // Gerado pelo professor ao ativar
            foto: ""
        };

        try {
            const docRef = db.collection('users').doc(profUid);
            const doc = await docRef.get();
            const data = doc.data();
            let listaAlunos = data.alunos || [];
            
            listaAlunos.push(novoAluno);
            
            await docRef.update({ alunos: listaAlunos });
            
            document.getElementById('areaForm').style.display = 'none';
            document.getElementById('mensagemSucesso').style.display = 'block';
        } catch (error) {
            alert("Erro ao enviar cadastro. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "ENVIAR CADASTRO";
        }
    };

    carregarDadosProfessor();
</script>
</body>
</html>
