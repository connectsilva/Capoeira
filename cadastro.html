<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Cadastro de Aluno - Capoeira Control</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00c853;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --input-bg: #252525;
            --text-main: #ffffff;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: sans-serif; 
            display: flex; justify-content: center; padding: 20px;
        }

        .form-card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid var(--primary); 
            width: 100%; max-width: 500px; 
        }

        label { color: var(--primary); font-size: 12px; font-weight: bold; display: block; margin-top: 15px; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin-top: 5px; 
            background: var(--input-bg); border: 1px solid #333; 
            color: #fff; border-radius: 8px; 
        }

        .photo-area {
            text-align: center; margin-bottom: 20px;
        }

        #preview {
            width: 100px; height: 100px; border-radius: 50%;
            border: 2px dashed var(--primary); object-fit: cover; margin-bottom: 10px;
        }

        button { 
            width: 100%; padding: 15px; background: var(--primary); 
            border: none; border-radius: 8px; font-weight: bold; 
            margin-top: 25px; cursor: pointer;
        }

        .success-msg { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="form-card" id="formContainer">
    <h2 style="text-align:center; color:var(--primary)">Ficha de Inscrição</h2>
    <p style="text-align:center; font-size: 14px;">Preencha todos os dados abaixo</p>

    <div class="photo-area">
        <img id="preview" src="https://via.placeholder.com/100">
        <input type="file" id="foto" accept="image/*" onchange="previewImg(this)" style="display:none">
        <button type="button" onclick="document.getElementById('foto').click()" style="margin-top:0; padding:8px; background:#333; color:#fff; font-size:11px">ADICIONAR FOTO</button>
    </div>

    <label>Nome Completo</label>
    <input id="nome" placeholder="Seu nome completo">

    <label>Apelido (Capoeira)</label>
    <input id="apelido" placeholder="Como é conhecido">

    <label>Data de Nascimento</label>
    <input id="nascimento" type="date">

    <label>Sexo</label>
    <select id="sexo">
        <option value="Masculino">Masculino</option>
        <option value="Feminino">Feminino</option>
    </select>

    <label>WhatsApp</label>
    <input id="tel" type="tel" placeholder="(00) 00000-0000">

    <label>CEP</label>
    <input id="cep" placeholder="00000-000">

    <label>Cidade</label>
    <input id="cidade">

    <label>Bairro</label>
    <input id="bairro">

    <label>Mora com quem?</label>
    <input id="reside_com" placeholder="Ex: Pais, Esposa, Sozinho">

    <label>Nome do Responsável (se menor)</label>
    <input id="resp_nome">

    <label>Telefone de Emergência</label>
    <input id="emergencia_fone" placeholder="(00) 00000-0000">

    <label>Possui Alergia?</label>
    <textarea id="alergia" rows="2" placeholder="Se sim, quais?"></textarea>

    <label>Toma algum Remédio?</label>
    <textarea id="remedio" rows="2" placeholder="Se sim, quais?"></textarea>

    <label>Restrição Médica ou Física?</label>
    <textarea id="restricao" rows="2" placeholder="Ex: Problema no joelho"></textarea>

    <label>Autoriza saída desacompanhado? (Menores)</label>
    <select id="autoriza_saida">
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
    </select>

    <button onclick="enviarCadastro()">FINALIZAR INSCRIÇÃO</button>
</div>

<div id="sucesso" class="success-msg">
    <h2 style="color:var(--primary)">✅ Cadastro Realizado!</h2>
    <p>Suas informações foram enviadas ao professor.</p>
    <p>Seja bem-vindo(a)!</p>
</div>

<script>
    // MESMA CONFIGURAÇÃO DO SEU APP
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAifUhJB6krANoJhGSI-CBYOCElm-QLa1Y",
  authDomain: "capoeira-oficial-b7421.firebaseapp.com",
  databaseURL: "https://capoeira-oficial-b7421-default-rtdb.firebaseio.com",
  projectId: "capoeira-oficial-b7421",
  storageBucket: "capoeira-oficial-b7421.firebasestorage.app",
  messagingSenderId: "1020091949434",
  appId: "1:1020091949434:web:6a1bc84179c9f99a76b6c3",
  measurementId: "G-ZCCXZ44Q50"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Pega o UID do professor pela URL (?ref=ID_DO_PROFESSOR)
    const urlParams = new URLSearchParams(window.location.search);
    const profUID = urlParams.get('ref');

    function previewImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('preview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function enviarCadastro() {
        if(!profUID) return alert("Erro: Link inválido. Peça um novo link ao seu professor.");
        
        const nome = document.getElementById('nome').value;
        if(!nome) return alert("Por favor, preencha seu nome.");

        const btn = document.querySelector('button');
        btn.innerText = "ENVIANDO...";
        btn.disabled = true;

        try {
            // Busca os dados atuais do professor
            const docRef = db.collection('users').doc(profUID);
            const doc = await docRef.get();
            
            if (!doc.exists) throw new Error("Professor não encontrado.");

            const dadosProf = doc.data();
            const listaAlunos = dadosProf.alunos || [];

            // Cria o novo objeto do aluno
            const novoAluno = {
                nome: nome,
                apelido: document.getElementById('apelido').value,
                nascimento: document.getElementById('nascimento').value,
                sexo: document.getElementById('sexo').value,
                tel: document.getElementById('tel').value,
                cep: document.getElementById('cep').value,
                cidade: document.getElementById('cidade').value,
                bairro: document.getElementById('bairro').value,
                reside_com: document.getElementById('reside_com').value,
                resp_nome: document.getElementById('resp_nome').value,
                emergencia_fone: document.getElementById('emergencia_fone').value,
                alergia: document.getElementById('alergia').value,
                remedio: document.getElementById('remedio').value,
                restricao: document.getElementById('restricao').value,
                autoriza_saida: document.getElementById('autoriza_saida').value,
                foto: document.getElementById('preview').src,
                valor: "0", // Professor define depois
                parcelas: [], // Professor define depois
                aberto: false
            };

            // Adiciona na lista e salva no Firebase
            listaAlunos.push(novoAluno);
            await docRef.update({ alunos: listaAlunos });

            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('sucesso').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("Erro ao enviar: " + error.message);
            btn.innerText = "FINALIZAR INSCRIÇÃO";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
