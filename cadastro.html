<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno - Capoeira Control</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00c853;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --input-bg: #252525;
            --text-main: #ffffff;
            --radius: 12px;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .form-container, .sucesso-container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--radius);
            border: 1px solid var(--primary);
            box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; margin-bottom: 10px; }

        label { font-size: 12px; color: var(--primary); font-weight: bold; display: block; margin-top: 15px; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; 
            border: 1px solid #333; background: var(--input-bg); color: #fff; box-sizing: border-box;
        }

        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        .row > div { flex: 1; min-width: 150px; }

        button { 
            width: 100%; padding: 15px; background: var(--primary); border: none; 
            border-radius: 8px; color: #000; font-weight: bold; margin-top: 25px; cursor: pointer;
            transition: opacity 0.3s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Estilo da Mensagem de Sucesso */
        #mensagemSucesso { 
            display: none; 
            text-align: center; 
            animation: fadeIn 0.5s;
        }
        .check-icon { font-size: 50px; margin-bottom: 15px; }
        .btn-voltar { 
            display: inline-block; margin-top: 20px; color: var(--primary); 
            text-decoration: none; border: 1px solid var(--primary); padding: 10px 20px; border-radius: 8px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="areaForm" class="form-container">
    <div class="header">
        <img id="profLogo" class="logo" src="https://via.placeholder.com/80">
        <h2 id="profNomeAcad" style="margin:0">Carregando...</h2>
        <p id="profNome" style="font-size:14px; color:#aaa"></p>
    </div>

    <form id="cadastroForm">
        <label>Nome Completo</label>
        <input type="text" id="nome" required>

        <div class="row">
            <div><label>Apelido</label><input type="text" id="apelido"></div>
            <div><label>Data de Nascimento</label><input type="date" id="nascimento" required></div>
        </div>

        <div class="row">
            <div>
                <label>Sexo</label>
                <select id="sexo" required>
                    <option value="">Selecionar</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>
            <div><label>WhatsApp</label><input type="tel" id="tel" placeholder="(99) 99999-9999" required></div>
        </div>

        <label>Endereço Completo</label>
        <input type="text" id="endereco" placeholder="Rua, número, bairro">

        <label>Com quem reside?</label>
        <input type="text" id="reside_com">

        <label>Alergias ou Condições Médicas?</label>
        <textarea id="alergia" rows="2" placeholder="Se não houver, deixe em branco"></textarea>

        <label>Contato de Emergência (Telefone)</label>
        <input type="tel" id="emergencia_fone" required>

        <button type="submit" id="btnEnviar">ENVIAR CADASTRO</button>
    </form>
</div>

<div id="mensagemSucesso" class="sucesso-container">
    <div class="check-icon">🏹</div>
    <h2 style="color: var(--primary)">Axé, tudo pronto!</h2>
    <p>Sua ficha de inscrição foi enviada com sucesso.</p>
    <p><strong>Seja muito bem-vindo(a) à nossa família!</strong></p>
    <a href="javascript:location.reload()" class="btn-voltar">NOVO CADASTRO</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBaR3l4VXYRIHyvcyqMco6Sy4_-eYGpR8g",
        authDomain: "teste02-ce0d2.firebaseapp.com",
        projectId: "teste02-ce0d2",
        storageBucket: "teste02-ce0d2.firebasestorage.app",
        messagingSenderId: "389717337129",
        appId: "1:389717337129:web:fdc718e47ff6ea73f96838"
    };    
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const profUid = urlParams.get('ref');

    async function carregarDadosProfessor() {
        if(!profUid) {
            document.getElementById('profNomeAcad').innerText = "Erro: Link sem referência";
            return;
        }
        try {
            const doc = await db.collection('users').doc(profUid).get();
            if(doc.exists) {
                const data = doc.data();
                if(data.config) {
                    document.getElementById('profNomeAcad').innerText = data.config.nome || "Academia";
                    document.getElementById('profNome').innerText = data.config.prof || "";
                    document.getElementById('profLogo').src = data.config.logo || "https://via.placeholder.com/80";
                }
            } else {
                alert("Professor não encontrado!");
            }
        } catch (e) {
            console.error(e);
        }
    }

    document.getElementById('cadastroForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const novoAluno = {
            id: Date.now(), // Adicionado ID único para o aluno
            nome: document.getElementById('nome').value,
            apelido: document.getElementById('apelido').value,
            nascimento: document.getElementById('nascimento').value,
            sexo: document.getElementById('sexo').value,
            tel: document.getElementById('tel').value,
            endereco: document.getElementById('endereco').value,
            reside_com: document.getElementById('reside_com').value,
            alergia: document.getElementById('alergia').value,
            emergencia_fone: document.getElementById('emergencia_fone').value,
            dataCadastro: new Date().toISOString(),
            status: "pendente",
            valor: 0,
            parcelas: [],
            foto: ""
        };

        try {
            const docRef = db.collection('users').doc(profUid);
            
            // O uso de arrayUnion evita que um aluno sobrescreva o outro
            await docRef.update({
                alunos: firebase.firestore.FieldValue.arrayUnion(novoAluno)
            });
            
            document.getElementById('areaForm').style.display = 'none';
            document.getElementById('mensagemSucesso').style.display = 'block';
        } catch (error) {
            console.error("Erro ao salvar:", error);
            alert("Erro ao enviar cadastro. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "ENVIAR CADASTRO";
        }
    };

    carregarDadosProfessor();
</script>
</body>
</html>
