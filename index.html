<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Capoeira Control Pro v3.1 - Full</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00c853">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script>
      if ('service-worker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('PWA Pronto!'))
            .catch(err => console.log('Erro no PWA', err));
        });
      }
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00c853;
            --primary-dark: #0f6b63;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --input-bg: #252525;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --danger: #ff5252;
            --warning: #ffab40;
            --info: #2196f3;
            --radius: 12px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; outline: none; }
        body { 
            background: radial-gradient(circle at top, var(--primary-dark), var(--bg-dark));
            color: var(--text-main); margin: 0; background-attachment: fixed; min-height: 100vh; padding-bottom: 50px;
        }

        .container { max-width: 800px; margin: auto; padding: 20px; display: none; }

        /* Login */
        #loginBox { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 99999; padding: 20px; }
        .login-card { background: var(--card-bg); padding: 30px; border-radius: var(--radius); border: 1px solid var(--primary); width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); margin-bottom: 10px; background: #222; }
        .password-container { position: relative; margin-top: 10px; }
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-dim); padding: 5px; }
        
        .remember-me { display: flex; align-items: center; gap: 8px; margin-top: 15px; font-size: 12px; color: var(--text-dim); cursor: pointer; justify-content: center; }
        .remember-me input { width: auto !important; margin: 0; cursor: pointer; accent-color: var(--primary); }

        /* App Layout */
        .header-academia { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.1); }
        .logo-academia { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; border: 1px solid var(--primary); }
        .settings-btn { font-size: 22px; cursor: pointer; background: rgba(255,255,255,0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.3s; }
        
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .box { background: var(--card-bg); padding: 15px; border-radius: var(--radius); text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .box span { font-size: 24px; font-weight: bold; color: var(--primary); display: block; }

        .card { background: var(--card-bg); border-radius: var(--radius); margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .acordeon-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
        .acordeon-content { max-height: 0; overflow: hidden; transition: 0.4s ease; padding: 0 20px; }
        .acordeon-content.aberto { max-height: 2000px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }

        .photo-upload { width: 80px; height: 80px; background: var(--input-bg); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px dashed var(--primary); overflow: hidden; position: relative; }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; }
        
        label { font-size: 11px; color: var(--primary); font-weight: bold; display: block; margin-top: 10px; }
        input, textarea { padding: 12px; border-radius: 8px; width: 100%; background: var(--input-bg); color: #fff; border: 1px solid transparent; margin-top: 5px; }
        input:focus { border-color: var(--primary); }
        
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn { background: var(--primary); color: #000; }
        .btn-info { background: var(--info); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 10px; overflow-x: auto; }
        .tabs button { flex: 1; background: transparent; color: var(--text-dim); font-size: 11px; white-space: nowrap; border: 1px solid transparent; }
        .tabs button.abaAtiva { background: var(--card-bg); color: var(--primary); border-color: rgba(0, 200, 83, 0.3); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .aluno-item { background: #1e1e1e; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); overflow: hidden; }
        .aluno-header { padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .aluno-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #333; }
        .parcela { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 8px; }

        #configMenu { display:none; position:fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 15px; overflow-y: auto; }
        .config-container { max-width: 500px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: var(--radius); border: 1px solid var(--primary); }

        .progress-bg { background: #333; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--primary); height: 100%; width: 0%; transition: 1s ease; }

        /* Estilo da Ficha Completa */
        #modalFicha { display:none; position:fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; padding: 15px; overflow-y: auto; }
        .ficha-card { max-width: 500px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: var(--radius); border: 1px solid var(--primary); }
        .ficha-item { margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .ficha-item b { color: var(--primary); font-size: 11px; display: block; text-transform: uppercase; }
        .ficha-item span { font-size: 15px; color: #fff; }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="login-card">
        <img id="loginLogoImg" class="login-logo" src="https://via.placeholder.com/80">
        <h2 id="loginNomeAcad" style="color:var(--primary); margin: 5px 0;">Academia</h2>
        <p id="loginNomeProf" style="font-size:14px; color:var(--text-main); margin-bottom:20px; font-weight: bold;">Professor</p>
        
        <input id="lUser" type="email" placeholder="E-mail">
        <div class="password-container">
            <input id="lPass" type="password" placeholder="Senha">
            <span class="toggle-password" onclick="togglePass()">👁️</span>
        </div>

        <label class="remember-me">
            <input type="checkbox" id="lRemember"> Lembrar meu e-mail
        </label>

        <button class="btn" style="width:100%; margin-top:20px" onclick="entrar()">ENTRAR NO SISTEMA</button>
        <p style="margin-top: 15px; font-size: 13px;"><a href="#" onclick="recuperarSenha()" style="color: var(--text-dim); text-decoration: none;">Recuperar senha</a></p>
    </div>
</div>

<div id="configMenu">
    <div class="config-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="color:var(--primary); margin:0">⚙️ Configurações</h2>
            <button onclick="toggleSettings()" style="background:none; color:var(--danger); font-size:30px">×</button>
        </div>

        <div class="tabs">
            <button id="btnSetGeral" class="abaAtiva" onclick="mudarTabConfig('Geral')">GERAL</button>
            <button id="btnSetFin" onclick="mudarTabConfig('Fin')">FINANCEIRO</button>
            <button id="btnSetMsg" onclick="mudarTabConfig('Msg')">COBRANÇA</button>
            <button id="btnSetDados" onclick="mudarTabConfig('Dados')">SAIR</button>
        </div>

        <div id="setGeral">
            <div class="photo-upload" onclick="$('cfgFileLogo').click()"><img id="cfgLogoPreview" src=""></div>
            <input type="file" id="cfgFileLogo" hidden onchange="previewImg(this, 'cfgLogoPreview')">
            
            <label>Nome Academia</label>
            <input id="cfgNome">
            
            <label>Professor</label>
            <input id="cfgProf">
            
            <!-- Campo do Link de Cadastro -->
            <label>Link de Cadastro (Novos Alunos)</label>
            <div style="display:flex; gap:5px; margin-top:5px">
                <input id="linkCadastro" readonly style="font-size:10px; background:#111">
                <button class="btn-info" onclick="copiarLink()" style="padding:0 15px">📋</button>
            </div>

            <label>Chave PIX</label>
            <input id="cfgPix">
            
            <button class="btn" style="width:100%; margin-top:15px" onclick="salvarConfig()">💾 SALVAR ALTERAÇÕES</button>
            
            <hr style="border:0; border-top:1px solid #333; margin:20px 0">
            
            <button class="btn" style="width:100%; background:#333; color:#fff" onclick="$('fileBackup').click()">📥 IMPORTAR BACKUP</button>
            <input type="file" id="fileBackup" hidden onchange="importarBackup(this)">
        </div>

        <div id="setFin" style="display:none">
            <h3 style="color:var(--primary); font-size:16px">Resumo (<span id="txtMesAtual"></span>)</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div style="background:#000; padding:10px; border-radius:8px"><small>PAGO</small><br><b id="finMensal">R$ 0,00</b></div>
                <div style="background:#000; padding:10px; border-radius:8px"><small>PENDENTE</small><br><b id="finPendente" style="color:var(--warning)">R$ 0,00</b></div>
            </div>
            <div style="background: rgba(255, 82, 82, 0.1); padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid var(--danger); text-align: center;">
                <small style="color:var(--danger); font-weight: bold;">INADIMPLÊNCIA (% DE ALUNOS)</small>
                <div style="font-size: 28px; font-weight: bold; color: var(--text-main);" id="percInadimplencia">0%</div>
            </div>
            <div class="progress-bg"><div id="barraProgresso" class="progress-fill"></div></div>
        </div>

        <div id="setMsg" style="display:none">
            <label>Template WhatsApp</label>
            <textarea id="cfgMsg" rows="12"></textarea>
            <button class="btn" style="width:100%; margin-top:15px" onclick="salvarConfig()">💾 SALVAR MENSAGEM</button>
        </div>

        <div id="setDados" style="display:none">
            <button class="btn-danger" style="width:100%" onclick="logout()">SAIR DA CONTA</button>
        </div>
    </div>
</div>

<div class="container" id="mainApp">
    <div class="header-academia">
        <img id="logoTopo" class="logo-academia" src="https://via.placeholder.com/80">
        <div style="flex:1"><h1 id="nomeTopo" style="margin:0; font-size:18px"></h1><small id="profTopo"></small></div>
        <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
    </div>

    <div class="dashboard">
        <div class="box"><small>ALUNOS</small><span id="dAlunos">0</span></div>
        <div class="box"><small>ATRASOS</small><span id="dAtraso" style="color:var(--danger)">0</span></div>
    </div>

    <div class="card">
        <div class="acordeon-header" onclick="toggleAcordeon('formCadastro', 'iconForm')">
            <b id="tituloForm">➕ NOVO ALUNO</b><b id="iconForm">+</b>
        </div>
        <div id="formCadastro" class="acordeon-content">
            <input type="hidden" id="editIndex" value="-1">
            <div class="photo-upload" onclick="$('alunoFileFoto').click()"><img id="alunoFotoPreview" src="https://via.placeholder.com/80"></div>
            <input type="file" id="alunoFileFoto" hidden onchange="previewImg(this, 'alunoFotoPreview')">
            <label>Nome</label><input id="nome">
            <label>Apelido</label><input id="apelido">
            <label>WhatsApp</label><input id="tel" type="tel">
            <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Valor R$</label><input id="valor" type="number"></div>
            <div style="flex:1"><label>Mês de Início (Dia 10 fixo)</label><input id="venc" type="date"></div>
            </div>

            <div style="display:flex; gap:10px; margin-top:15px">
                <button id="btnCadastrar" class="btn" style="flex:2" onclick="salvarAluno()">CADASTRAR</button>
                <button id="btnCancelarEdit" class="btn-danger" style="flex:1; display:none" onclick="cancelarEdicao()">CANCELAR</button>
            </div>
        </div>
    </div>

    <input id="inputBusca" placeholder="🔍 Buscar aluno..." oninput="render()" style="margin-bottom:15px">

<div class="tabs">
    <button id="tNov" class="abaAtiva" onclick="trocarAba('novo')">NOVOS</button>
    <button id="tAtr" onclick="trocarAba('atrasado')">ATRASADOS</button>
    <button id="tPen" onclick="trocarAba('pendente')">PENDENTES</button>
    <button id="tDia" onclick="trocarAba('pago')">EM DIA</button>
</div>

    <div id="listaAlunos"></div>
</div>

<div id="modalFicha">
    <div class="ficha-card">
        <div style="text-align:center; margin-bottom:20px">
            <img id="fichaFoto" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--primary); object-fit:cover">
            <h2 id="fichaNome" style="margin:10px 0 0 0; color:var(--primary)"></h2>
        </div>
        <div id="corpoFicha"></div>
        <button class="btn-danger" style="width:100%; margin-top:20px" onclick="$('modalFicha').style.display='none'">FECHAR</button>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAifUhJB6krANoJhGSI-CBYOCElm-QLa1Y",
  authDomain: "capoeira-oficial-b7421.firebaseapp.com",
  databaseURL: "https://capoeira-oficial-b7421-default-rtdb.firebaseio.com",
  projectId: "capoeira-oficial-b7421",
  storageBucket: "capoeira-oficial-b7421.firebasestorage.app",
  messagingSenderId: "1020091949434",
  appId: "1:1020091949434:web:6a1bc84179c9f99a76b6c3",
  measurementId: "G-ZCCXZ44Q50"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let alunos = [];
    const MENSAGEM_PADRAO = "Olá, [nome]! 👋\nTudo bem?\n\nIdentificamos que sua mensalidade ainda está em aberto. Seguem os detalhes:\n\n📆 Vencimento: [data]\n💰 Valor: R$ [valor]\n🔑 Chave Pix para pagamento: [pix]\n\nCaso já tenha realizado o pagamento, por favor desconsidere esta mensagem.\n\nSe precisar de qualquer ajuda ou tiver alguma dúvida, estou à disposição 🙂";

    let config = { 
        nome: "Academia Capoeira", 
        prof: "Professor", 
        pix: "", 
        logo: "https://via.placeholder.com/80", 
        msg: MENSAGEM_PADRAO 
    };

    let abaAtual = 'atrasado';

    window.onload = () => {
        auth.signOut().then(() => {
            $("loginBox").style.display = "flex";
            $("mainApp").style.display = "none";
        });
        const email = localStorage.getItem("capoeira_email");
        if(email) { $("lUser").value = email; $("lRemember").checked = true; }
        const cached = localStorage.getItem("capoeira_config");
        if(cached) {
            const c = JSON.parse(cached);
            $("loginNomeAcad").innerText = c.nome;
            $("loginNomeProf").innerText = c.prof;
            $("loginLogoImg").src = c.logo;
        }
    };

    function entrar() {
        const u = $("lUser").value, p = $("lPass").value;
        if(!u || !p) return alert("Preencha os campos!");
        auth.setPersistence(firebase.auth.Auth.Persistence.SESSION).then(() => {
            if($("lRemember").checked) localStorage.setItem("capoeira_email", u);
            else localStorage.removeItem("capoeira_email");
            return auth.signInWithEmailAndPassword(u, p);
        }).catch(e => alert("Erro no login!"));
    }

    auth.onAuthStateChanged(user => {
        if(user) { 
            $("loginBox").style.display="none"; 
            $("mainApp").style.display="block"; 
            carregarDados(); 
        } else { 
            $("loginBox").style.display="flex"; 
            $("mainApp").style.display="none"; 
        }
    });

    async function carregarDados() {
        if(!auth.currentUser) return;
        const doc = await db.collection('users').doc(auth.currentUser.uid).get();
        if(doc.exists) {
            const d = doc.data();
            alunos = d.alunos || [];
            config = d.config || config;
            if(!config.msg || config.msg.trim() === "") config.msg = MENSAGEM_PADRAO;
            localStorage.setItem("capoeira_config", JSON.stringify(config));
            aplicarConfig();
            render();
        } else {
            aplicarConfig();
        }
    }

    function aplicarConfig() {
        if(!auth.currentUser) return;
        $("nomeTopo").innerText = config.nome; 
        $("profTopo").innerText = config.prof;
        $("logoTopo").src = config.logo; 
        $("loginLogoImg").src = config.logo;
        $("loginNomeAcad").innerText = config.nome; 
        $("loginNomeProf").innerText = config.prof;
        $("cfgNome").value = config.nome; 
        $("cfgProf").value = config.prof;
        $("cfgPix").value = config.pix; 
        $("cfgMsg").value = config.msg;
        $("cfgLogoPreview").src = config.logo;

        // Gerar o Link de Cadastro com o UID do Firebase
        const uid = auth.currentUser.uid;
        const urlBase = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
        $("linkCadastro").value = `${urlBase}cadastro.html?ref=${uid}`;
    }

    async function sincronizar() {
        if(!auth.currentUser) return;
        await db.collection('users').doc(auth.currentUser.uid).set({ config, alunos });
        aplicarConfig();
        render();
    }

function render() {
    const lista = $("listaAlunos"); lista.innerHTML = "";
    const busca = $("inputBusca").value.toLowerCase();
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    let totalAtrasos = 0;

    alunos.forEach((a, i) => {
        // Se o aluno não tem parcelas, ele é considerado "NOVO"
        const ehNovo = !a.parcelas || a.parcelas.length === 0;

        const parse = d => { 
            if(!d) return new Date();
            const [dia, mes, ano] = d.split('/'); 
            return new Date(ano, mes-1, dia); 
        };

        const atr = a.parcelas ? a.parcelas.filter(p => !p.pago && parse(p.data) < hoje) : [];
        const pen = a.parcelas ? a.parcelas.filter(p => !p.pago && parse(p.data) >= hoje) : [];
        const pag = a.parcelas ? a.parcelas.filter(p => p.pago) : [];

        if(atr.length > 0) totalAtrasos += atr.length;
        if (busca && !a.nome.toLowerCase().includes(busca) && !a.apelido.toLowerCase().includes(busca)) return;

        // Lógica de exibição por aba
        let mostrar = false;
        if (abaAtual === 'novo' && ehNovo) mostrar = true;
        if (abaAtual === 'atrasado' && !ehNovo && atr.length > 0) mostrar = true;
        if (abaAtual === 'pendente' && !ehNovo && pen.length > 0) mostrar = true;
        if (abaAtual === 'pago' && !ehNovo && pag.length > 0) mostrar = true;

        if(mostrar) {
            lista.innerHTML += `
            <div class="aluno-item" style="border-left-color: ${ehNovo ? 'var(--info)' : (atr.length ? 'var(--danger)' : 'var(--primary)')}">
                <div class="aluno-header" onclick="toggleAluno(${i})">
                    <img src="${a.foto || 'https://via.placeholder.com/80'}" class="aluno-img">
                    <div style="flex:1">
                        <b>${a.nome}</b> ${ehNovo ? '<span style="background:var(--info); color:#000; font-size:9px; padding:2px 5px; border-radius:4px; margin-left:5px">NOVO</span>' : ''}<br>
                        <small>${a.apelido || ''}</small>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center">
                         <button onclick="event.stopPropagation(); verFicha(${i})" style="background:none; color:var(--warning); font-size:18px">📋</button>
                         <button onclick="event.stopPropagation(); prepararEdicao(${i})" style="background:none; color:var(--info); font-size:18px">✏️</button>
                         <span style="background:#333; padding:2px 8px; border-radius:10px; font-size:11px">${ehNovo ? '!' : (abaAtual === 'atrasado' ? atr.length : (abaAtual === 'pendente' ? pen.length : pag.length))}</span>
                    </div>
                </div>
                <div class="acordeon-content ${a.aberto ? 'aberto' : ''}">
                    ${ehNovo ? 
                        `<p style="font-size:12px; color:var(--text-dim); text-align:center">Este aluno ainda não possui mensalidades. <br><br> <button class="btn" onclick="prepararEdicao(${i})">DEFINIR MENSALIDADES</button></p>` :
                        (abaAtual === 'atrasado' ? atr : (abaAtual === 'pendente' ? pen : pag)).map(p => `
                        <div class="parcela">
                            <div><b>R$ ${a.valor}</b><br><small>${p.data}</small></div>
                            <div style="display:flex; gap:5px">
                                <button class="btn" onclick="baixar(${i}, '${p.data}')">${p.pago?'↩':'✔'}</button>
                                <button class="btn" style="background:var(--warning)" onclick="cobrar(${i}, '${p.data}')">📱</button>
                                <button class="btn-danger" onclick="excluirAluno(${i})">🗑️</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }
    });
    $("dAlunos").innerText = alunos.length;
    $("dAtraso").innerText = totalAtrasos;
    gerarFin();
}

    function verFicha(i) {
        const a = alunos[i];
        $("fichaFoto").src = a.foto || 'https://via.placeholder.com/80';
        $("fichaNome").innerText = a.nome;
        const campos = [
            { label: "Apelido", valor: a.apelido },
            { label: "Nascimento", valor: a.nascimento },
            { label: "Sexo", valor: a.sexo },
            { label: "WhatsApp", valor: a.tel },
            { label: "Endereço", valor: `${a.bairro || ''}, ${a.cidade || ''} - ${a.cep || ''}` },
            { label: "Responsável", valor: `${a.resp_nome || 'O próprio'} (${a.reside_com || ''})` },
            { label: "Alergia", valor: a.alergia },
            { label: "Remédio", valor: a.remedio },
            { label: "Restrição", valor: a.restricao },
            { label: "Emergência", valor: a.emergencia_fone },
            { label: "Saída só?", valor: a.autoriza_saida }
        ];
        $("corpoFicha").innerHTML = campos.map(c => `
            <div class="ficha-item">
                <b>${c.label}</b>
                <span>${c.valor || '---'}</span>
            </div>
        `).join('');
        $("modalFicha").style.display = "block";
    }

    function copiarLink() {
        const link = $("linkCadastro");
        link.select();
        link.setSelectionRange(0, 99999); 
        navigator.clipboard.writeText(link.value).then(() => {
            alert("Link copiado! Envie para o novo aluno.");
        });
    }

function trocarAba(aba) {
    abaAtual = aba;
    ['tNov', 'tAtr', 'tPen', 'tDia'].forEach(id => {
        if($(id)) $(id).classList.remove('abaAtiva');
    });
    if(aba === 'novo') $('tNov').classList.add('abaAtiva');
    if(aba === 'atrasado') $('tAtr').classList.add('abaAtiva');
    if(aba === 'pendente') $('tPen').classList.add('abaAtiva');
    if(aba === 'pago') $('tDia').classList.add('abaAtiva');
    render();
}
    function prepararEdicao(i) {
        const a = alunos[i];
        $("editIndex").value = i;
        $("nome").value = a.nome;
        $("apelido").value = a.apelido || '';
        $("tel").value = a.tel || '';
        $("valor").value = a.valor;
        $("alunoFotoPreview").src = a.foto || 'https://via.placeholder.com/80';
        $("tituloForm").innerText = "✏️ EDITAR ALUNO";
        $("btnCadastrar").innerText = "SALVAR ALTERAÇÕES";
        $("btnCancelarEdit").style.display = "block";
        if(!$("formCadastro").classList.contains('aberto')) toggleAcordeon('formCadastro', 'iconForm');
        $("formCadastro").scrollIntoView({ behavior: 'smooth' });
    }

    function cancelarEdicao() {
        $("editIndex").value = "-1";
        ["nome", "apelido", "tel", "valor", "venc"].forEach(id => $(id).value = "");
        $("alunoFotoPreview").src = "https://via.placeholder.com/80";
        $("tituloForm").innerText = "➕ NOVO ALUNO";
        $("btnCadastrar").innerText = "CADASTRAR";
        $("btnCancelarEdit").style.display = "none";
        toggleAcordeon('formCadastro', 'iconForm');
    }

function salvarAluno() {
    const idx = parseInt($("editIndex").value);
    const n = $("nome").value, v = $("valor").value;
    if(!n || !v) return alert("Preencha o nome e valor!");

    // Função interna para gerar as 12 parcelas fixas no dia 10
    const gerarParcelasFixas = (dataBase) => {
        const parcelas = [];
        let [ano, mes, dia] = dataBase.split('-');
        // Forçamos o dia para 10, independente do que foi selecionado no calendário
        dia = "10"; 
        
        for(let i=0; i<12; i++) {
            let dt = new Date(ano, parseInt(mes)-1 + i, 10);
            // Ajuste para evitar que o JS pule meses em viradas de ano
            dt.setDate(10); 
            parcelas.push({ data: dt.toLocaleDateString('pt-BR'), pago: false });
        }
        return parcelas;
    };

    if(idx === -1) {
        // Cadastro Manual
        const d = $("venc").value;
        if(!d) return alert("Escolha o mês de início!");
        const parcelas = gerarParcelasFixas(d);
        alunos.push({ 
            nome: n, 
            apelido: $("apelido").value, 
            tel: $("tel").value, 
            valor: v, 
            foto: $("alunoFotoPreview").src, 
            parcelas, 
            aberto: false 
        });
    } else {
        // Edição ou Aluno vindo do Link
        alunos[idx].nome = n; 
        alunos[idx].apelido = $("apelido").value;
        alunos[idx].tel = $("tel").value; 
        alunos[idx].valor = v;
        alunos[idx].foto = $("alunoFotoPreview").src;

        // Se for um aluno novo (sem parcelas), gera o carnê no dia 10
        if(!alunos[idx].parcelas || alunos[idx].parcelas.length === 0) {
            const d = $("venc").value;
            if(!d) return alert("Escolha o mês do primeiro pagamento!");
            alunos[idx].parcelas = gerarParcelasFixas(d);
        }
        cancelarEdicao();
    }
    sincronizar();
}

    function gerarFin() {
        let pagos = 0, pend = 0;
        const agora = new Date(), m = agora.getMonth(), y = agora.getFullYear();
        alunos.forEach(a => a.parcelas.forEach(p => {
            const [dia, mes, ano] = p.data.split('/');
            if(parseInt(mes)-1 === m && parseInt(ano) === y) {
                if(p.pago) pagos += parseFloat(a.valor); else pend += parseFloat(a.valor);
            }
        }));
        $("finMensal").innerText = "R$ " + pagos.toFixed(2);
        $("finPendente").innerText = "R$ " + pend.toFixed(2);
        $("barraProgresso").style.width = (pagos/(pagos+pend||1)*100) + "%";
        $("txtMesAtual").innerText = (m+1)+"/"+y;
    }

    function toggleAluno(i) {
        if (alunos[i].aberto) alunos[i].aberto = false;
        else { alunos.forEach(aluno => aluno.aberto = false); alunos[i].aberto = true; }
        render();
    }

    function toggleSettings() { $("configMenu").style.display = $("configMenu").style.display === "block" ? "none" : "block"; }
    function togglePass() { const p = $("lPass"); p.type = p.type === "password" ? "text" : "password"; }
    function baixar(i, d) { const p = alunos[i].parcelas.find(x => x.data === d); p.pago = !p.pago; sincronizar(); }
    function excluirAluno(i) { if(confirm("Excluir aluno?")) { alunos.splice(i,1); sincronizar(); } }
    function cobrar(i, d) {
        const a = alunos[i];
        const txt = config.msg.replace("[nome]", a.apelido || a.nome).replace("[data]", d).replace("[valor]", a.valor).replace("[pix]", config.pix);
        window.open(`https://wa.me/55${a.tel.replace(/\D/g,'')}?text=${encodeURIComponent(txt)}`);
    }
    function toggleAcordeon(id, icon) { $(id).classList.toggle('aberto'); }
    function previewImg(i, d) { if(i.files[0]) { const r = new FileReader(); r.onload = e => $(d).src = e.target.result; r.readAsDataURL(i.files[0]); } }
    function salvarConfig() { 
        config.nome = $("cfgNome").value; config.prof = $("cfgProf").value; 
        config.pix = $("cfgPix").value; config.msg = $("cfgMsg").value; 
        config.logo = $("cfgLogoPreview").src;
        sincronizar(); 
    }
    function logout() { auth.signOut(); }
    function mudarTabConfig(t) {
        ['Geral','Fin','Msg','Dados'].forEach(x => $(`set${x}`).style.display = x === t ? 'block' : 'none');
        ['Geral','Fin','Msg','Dados'].forEach(x => $(`btnSet${x}`).classList.remove('abaAtiva'));
        $(`btnSet${t}`).classList.add('abaAtiva');
    }
    function recuperarSenha() {
        const e = $("lUser").value;
        if(!e) return alert("Digite seu e-mail!");
        auth.sendPasswordResetEmail(e).then(() => alert("E-mail de recuperação enviado!")).catch(err => alert(err.message));
    }
    function importarBackup(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.alunos) {
                        alunos = data.alunos;
                        if(data.config) config = data.config;
                        await sincronizar();
                        alert("Backup importado com sucesso!");
                    }
                } catch(err) { alert("Arquivo inválido!"); }
            };
            reader.readAsText(input.files[0]);
        }
    }
</script>
