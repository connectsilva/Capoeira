<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Controle de Capoeira</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f6b63">
<link rel="apple-touch-icon" href="icon.png">

<style>
html{scroll-behavior:smooth;}
body{background:#0f6b63;color:#fff;font-family:Arial;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}

.card{
background:#141414;
padding:12px;
border-radius:10px;
margin-bottom:6px;
}

.form-box{max-height:0;overflow:hidden;transition:.3s}
.form-box.ativo{max-height:600px}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px
}

input{
padding:10px;
border:none;
border-radius:5px;
width:100%;
box-sizing:border-box;
background:#2b2b2b;
color:#fff;
transition:.2s;
border:1px solid transparent;
}

input:focus{
outline:none;
background:#bdbdbd;
color:#000;
border:2px solid #00e676;
box-shadow:0 0 14px #00e676cc;
transform:scale(1.02);
animation:focusGlow 1.2s infinite alternate;
}

@keyframes focusGlow{
0%{box-shadow:0 0 8px #00e67666;}
100%{box-shadow:0 0 16px #00e676dd;}
}

.form-full{grid-column:span 2}

button{
padding:6px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:12px
}

.btn{background:#00c853;color:#fff}
.btn-danger{background:#ff5252;color:#fff}
.btn-warning{background:#ff9800;color:#fff}

.aluno{
border:1px solid #333;
border-radius:10px;
padding:8px;
margin-bottom:6px
}

.aluno h3{
margin:0;
cursor:pointer;
font-size:15px
}

.parcelas{
max-height:70vh;
overflow-y:auto;
transition:.3s
}

.parcelas.ativo{
padding-top:5px
}

.parcela{
display:flex;
justify-content:space-between;
align-items:center;
padding:4px 0;
font-size:14px
}

.parcela-botoes{
display:flex;
gap:4px;
flex-wrap:wrap
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px
}

.box{
background:#1b1b1b;
padding:10px;
border-radius:10px;
text-align:center
}

.fab{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#25D366;
color:#fff;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:9999;
}

#topoMensalidade{
position:sticky;
top:0;
background:#141414;
z-index:5;
padding-top:5px;
}

.abaAtiva{
background:#ffffff22 !important;
box-shadow:0 0 8px #00000055;
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
<div id="sistema">

<h2>🥋 Controle de Capoeira</h2>

<div class="card dashboard">
<div class="box">👥 Alunos<br><span id="dAlunos">0</span></div>
<div class="box">💰 Pagas<br><span id="dPagas">0</span></div>
<div class="box">⚠️ Atraso<br><span id="dAtraso">0</span></div>
<div class="box">📉 Inad<br><span id="dInad">0%</span></div>

<!-- APPEND-ONLY: Backup -->
<div class="box">
<button class="btn" onclick="fazerBackup()">📦 Backup</button>
</div>

<!-- APPEND-ONLY: Restaurar -->
<div class="box">
<button class="btn-warning" onclick="document.getElementById('restoreFile').click()">
📥 Restaurar
</button>

<input
id="restoreFile"
type="file"
accept=".json"
style="display:none"
onchange="restaurarBackup(event)">
</div>
</div>

<div class="card">
<h3 style="cursor:pointer" onclick="toggleForm()">Adicionar Aluno</h3>

<div id="form" class="form-box">
<div class="form-grid">
<input id="nome" placeholder="Nome">
<input id="apelido" placeholder="Apelido">
<input id="valor" type="number" placeholder="Valor">
<input id="venc" type="date">
<input id="meses" type="number" placeholder="Meses">
<input id="tel" type="tel" placeholder="WhatsApp">

<button id="btnSalvar" class="btn form-full" onclick="salvarAluno()">Salvar</button>
</div>
</div>
</div>

<div class="card">
<h3>💰 Mensalidades</h3>

<div id="mensalidade" class="parcelas ativo">

<div id="topoMensalidade">

<div style="display:flex;gap:5px;margin-bottom:8px">
<button id="btnPend" class="btn" onclick="trocarAba('pendente')">Pendente</button>
<button id="btnAtraso" class="btn btn-warning abaAtiva" onclick="trocarAba('atrasado')">Atrasado</button>
<button id="btnEmDia" class="btn" onclick="trocarAba('emdia')">Em dia</button>
</div>

<input id="busca" placeholder="🔎 Buscar aluno..." oninput="render()"
style="margin-bottom:8px;padding:8px;border-radius:5px;border:none;width:100%">

</div>

<div id="lista"></div>
</div>
</div>

</div>
</div>

<div class="fab" onclick="toggleForm()">+</div>

<script>
const $=id=>document.getElementById(id)

let alunos=JSON.parse(localStorage.getItem("alunos"))||[]
let abaAtual="atrasado"
let editandoIndex=null

function salvar(){
localStorage.setItem("alunos",JSON.stringify(alunos))
}

function toggleForm(){
$("form").classList.toggle("ativo")
}

function trocarAba(a){
abaAtual=a

$("btnPend").classList.remove("abaAtiva")
$("btnAtraso").classList.remove("abaAtiva")
$("btnEmDia").classList.remove("abaAtiva")

if(a=="pendente") $("btnPend").classList.add("abaAtiva")
if(a=="atrasado") $("btnAtraso").classList.add("abaAtiva")
if(a=="emdia") $("btnEmDia").classList.add("abaAtiva")

render()
}

function limparForm(){
["nome","apelido","valor","venc","meses","tel"].forEach(i=>{
$(i).value=""
})
editandoIndex=null
$("btnSalvar").innerText="Salvar"
}

function formatar(d){
let x=new Date(d)
return `${String(x.getDate()).padStart(2,"0")}/${String(x.getMonth()+1).padStart(2,"0")}/${x.getFullYear()}`
}

function dataBR(d){
let [dia,mes,ano]=d.split("/")
return new Date(ano,mes-1,dia)
}

function gerarParcelas(v,m){
let base=new Date(v)
let arr=[]

for(let i=0;i<m;i++){
let d=new Date(base)
d.setMonth(d.getMonth()+i)

arr.push({
numero:i+1,
data:formatar(d),
pago:false
})
}

return arr
}

function salvarAluno(){
if(editandoIndex===null){
addAluno()
}else{
atualizarAluno()
}
}

function addAluno(){
let nome=$("nome").value.trim()
let apelido=$("apelido").value.trim()
let valor=$("valor").value
let venc=$("venc").value
let meses=$("meses").value
let tel=$("tel").value.trim()

if(!nome||!valor||!venc||!meses){
alert("Preencha tudo")
return
}

if(apelido && alunos.some(a=>(a.apelido||"").toLowerCase()===apelido.toLowerCase())){
alert("Já existe um aluno com esse apelido!")
return
}

alunos.push({
nome,
apelido,
valor:+valor,
tel,
parcelas:gerarParcelas(venc,meses),
open:false
})

salvar()
render()
limparForm()
$("form").classList.remove("ativo")
}

function atualizarAluno(){
let nome=$("nome").value.trim()
let apelido=$("apelido").value.trim()
let valor=$("valor").value
let venc=$("venc").value
let meses=$("meses").value
let tel=$("tel").value.trim()

if(!nome||!valor||!venc||!meses){
alert("Preencha tudo")
return
}

alunos[editandoIndex]={
...alunos[editandoIndex],
nome,
apelido,
valor:+valor,
tel,
parcelas:gerarParcelas(venc,meses)
}

editandoIndex=null
$("btnSalvar").innerText="Salvar"

salvar()
render()
limparForm()
$("form").classList.remove("ativo")
}

function toggleAluno(i){
alunos.forEach((a,idx)=>{
if(idx!==i) a.open=false
})
alunos[i].open=!alunos[i].open
render()
}

function togglePago(i,p){
alunos[i].parcelas[p].pago=!alunos[i].parcelas[p].pago
salvar()
render()
}

function cobrarAluno(i,p){
let a=alunos[i]

if(!a.tel) return alert("Sem WhatsApp")

let num=a.tel.replace(/\D/g,"")
if(num.length===11) num="55"+num
if(num.length<12) return alert("Número inválido")

let parcela=a.parcelas[p]
let [dia,mes,ano]=parcela.data.split("/")

const mesesNome=[
"Janeiro","Fevereiro","Março","Abril","Maio","Junho",
"Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
]

let referencia=`${mesesNome[parseInt(mes)-1]}/${ano}`

let msg=`Olá, ${a.nome}! 👋
Tudo bem?

Identificamos que sua mensalidade referente ao mês de ${referencia} ainda está em aberto. Seguem os detalhes:

🗓️ Vencimento: ${parcela.data}
💰 Valor total: R$ ${a.valor}

Caso o pagamento já tenha sido realizado, por favor desconsidere esta mensagem.

Se precisar de qualquer ajuda ou tiver alguma dúvida, estou à disposição 🙂`

window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`)
}

function cobrarTudo(i){
let a=alunos[i]

if(!a.tel) return alert("Sem WhatsApp")

let num=a.tel.replace(/\D/g,"")
if(num.length===11) num="55"+num
if(num.length<12) return alert("Número inválido")

let atrasadas=a.parcelas.filter(
p=>!p.pago && dataBR(p.data)<new Date()
)

if(!atrasadas.length){
alert("Esse aluno não possui parcelas atrasadas")
return
}

let total=atrasadas.length*a.valor

const mesesNome=[
"Janeiro","Fevereiro","Março","Abril","Maio","Junho",
"Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
]

let listaParcelas=atrasadas.map(p=>{
let [dia,mes,ano]=p.data.split("/")
return `• ${mesesNome[parseInt(mes)-1]}/${ano} - Venc: ${p.data}`
}).join("\n")

let msg=`Olá, ${a.nome}! 👋
Tudo bem?

Identificamos que você possui ${atrasadas.length} mensalidades em aberto. Seguem os detalhes:

${listaParcelas}

💰 Valor por mensalidade: R$ ${a.valor}
💵 Valor total pendente: R$ ${total}

Caso o pagamento já tenha sido realizado, por favor desconsidere esta mensagem.

Se precisar de qualquer ajuda ou tiver alguma dúvida, estou à disposição 🙂`

window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`)
}

function render(){
let lista=$("lista")
lista.innerHTML=""

let termo=$("busca").value.toLowerCase()

let pagas=0
let atraso=0
let alunosEmDia=0
let alunosEmAtraso=0

let ordenados=alunos
.map((a,i)=>({a,i}))
.sort((x,y)=>x.a.nome.localeCompare(y.a.nome,"pt-BR",{sensitivity:"base"}))

ordenados.forEach(({a,i})=>{

if(
termo &&
!a.nome.toLowerCase().includes(termo) &&
!(a.apelido||"").toLowerCase().includes(termo)
) return

let atrasadas=a.parcelas.filter(p=>!p.pago && dataBR(p.data)<new Date())
let pagasArr=a.parcelas.filter(p=>p.pago)
let pend=a.parcelas.filter(p=>!p.pago && dataBR(p.data)>=new Date())

pagas+=pagasArr.length
atraso+=atrasadas.length

if(atrasadas.length>0){
alunosEmAtraso++
}else{
alunosEmDia++
}

let exibir=
abaAtual=="pendente"?pend:
abaAtual=="emdia"?pagasArr:
atrasadas

let infoExtra=""

if(abaAtual=="pendente"){
infoExtra=`📌(${pend.length})`
}

if(abaAtual=="atrasado"){
infoExtra=`⚠️(${atrasadas.length})`
}

if(abaAtual=="emdia"){
infoExtra=`(${pagasArr.length}/${a.parcelas.length})`
}

let html=`
<div class="aluno">
<h3 onclick="toggleAluno(${i})">
${a.nome} (${a.apelido||""}) ${infoExtra}
</h3>

<div class="parcelas ${a.open?"ativo":""}">
`

if(a.open){

if(!exibir.length){
html+=`<div style="opacity:.6">Sem parcelas</div>`
}

exibir.forEach(p=>{
let id=a.parcelas.findIndex(x=>x===p)

html+=`
<div class="parcela">
<span>${p.numero} - ${p.data}</span>

<div class="parcela-botoes">
<button class="btn" onclick="editarAluno(${i})">Editar</button>
<button class="btn-warning" onclick="cobrarAluno(${i},${id})">Cobrar</button>

${atrasadas.length>=2
? `<button class="btn" onclick="cobrarTudo(${i})">Cobrar Tudo</button>`
: ""}

<button class="btn-danger" onclick="excluirAluno(${i})">Excluir</button>
<button onclick="togglePago(${i},${id})">${p.pago?"✔":"❌"}</button>
</div>
</div>
`
})
}

html+=`</div></div>`

lista.innerHTML+=html
})

$("dAlunos").innerText=alunos.length
$("dPagas").innerText=pagas
$("dAtraso").innerText=atraso

$("dInad").innerText=
(alunosEmDia+alunosEmAtraso
?((alunosEmAtraso/(alunosEmDia+alunosEmAtraso))*100).toFixed(1)
:0)+"%"
}

render()

function excluirAluno(i){
if(!confirm("Deseja realmente excluir este aluno?")) return
alunos.splice(i,1)
salvar()
render()
}

function editarAluno(i){
let a=alunos[i]

$("nome").value=a.nome
$("apelido").value=a.apelido||""
$("valor").value=a.valor
$("tel").value=a.tel||""
$("meses").value=a.parcelas.length

let primeira=a.parcelas[0].data.split("/")
$("venc").value=`${primeira[2]}-${primeira[1]}-${primeira[0]}`

editandoIndex=i
$("btnSalvar").innerText="Atualizar"

$("form").classList.add("ativo")

window.scrollTo({
top:$("form").offsetTop-20,
behavior:"smooth"
})
}

/* APPEND-ONLY: BACKUP */
function fazerBackup(){
let dados={
data:new Date().toISOString(),
alunos:alunos
}

let blob=new Blob(
[JSON.stringify(dados,null,2)],
{type:"application/json"}
)

let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download=`backup-capoeira-${Date.now()}.json`
a.click()

URL.revokeObjectURL(url)
}

/* APPEND-ONLY: RESTAURAR BACKUP */
function restaurarBackup(event){
let arquivo=event.target.files[0]

if(!arquivo) return

let reader=new FileReader()

reader.onload=function(e){
try{
let dados=JSON.parse(e.target.result)

if(!dados.alunos){
alert("Backup inválido")
return
}

if(!confirm("Deseja restaurar o backup? Isso substituirá os dados atuais.")){
return
}

alunos=dados.alunos

salvar()
render()

alert("Backup restaurado com sucesso!")

}catch{
alert("Erro ao restaurar backup")
}
}

reader.readAsText(arquivo)
}
</script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}
</script>

</body>
</html>
